{% extends 'dashboard/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="fas fa-info-circle me-2"></i>Church Information</h3>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-2"></i>Back</a>
    </div>
    
    <div class="card-custom p-4">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="row g-4">
                <div class="col-md-6">
                    <h5 class="mb-3">Basic Information</h5>
                    <div class="mb-3">
                        <label class="form-label">Church Name</label>
                        <input type="text" name="name" class="form-control" value="{{ info.name|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Logo</label>
                        <input type="file" name="logo" class="form-control" accept="image/*">
                        {% if info.logo %}<img src="{{ info.logo.url }}" class="mt-2" style="max-height: 80px;">{% endif %}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senior Pastor Name</label>
                        <input type="text" name="senior_pastor_name" class="form-control" value="{{ info.senior_pastor_name|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senior Pastor Title</label>
                        <input type="text" name="senior_pastor_title" class="form-control" value="{{ info.senior_pastor_title|default:'Senior Pastor' }}">
                    </div>
                </div>
                
                <div class="col-md-6">
                    <h5 class="mb-3">Contact Information</h5>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="2">{{ info.address|default:'' }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-6">
                            <div class="mb-3">
                                <label class="form-label">Phone</label>
                                <input type="text" name="phone" class="form-control" value="{{ info.phone|default:'' }}">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="mb-3">
                                <label class="form-label">Phone 2</label>
                                <input type="text" name="phone_2" class="form-control" value="{{ info.phone_2|default:'' }}">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ info.email|default:'' }}">
                    </div>
                </div>
                
                <div class="col-12">
                    <h5 class="mb-3">Social Media</h5>
                    <div class="row">
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">Facebook</label>
                                <input type="url" name="facebook" class="form-control" value="{{ info.facebook|default:'' }}">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">Instagram</label>
                                <input type="url" name="instagram" class="form-control" value="{{ info.instagram|default:'' }}">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">YouTube</label>
                                <input type="url" name="youtube" class="form-control" value="{{ info.youtube|default:'' }}">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">WhatsApp</label>
                                <input type="text" name="whatsapp" class="form-control" value="{{ info.whatsapp|default:'' }}">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="col-12">
                    <h5 class="mb-3">Mission, Vision & History</h5>
                    <div class="mb-3">
                        <label class="form-label">Welcome Message</label>
                        <textarea name="welcome_message" class="form-control" rows="3">{{ info.welcome_message|default:'' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mission</label>
                        <textarea name="mission" class="form-control" rows="3">{{ info.mission|default:'' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Vision</label>
                        <textarea name="vision" class="form-control" rows="3">{{ info.vision|default:'' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">History</label>
                        <textarea name="history" class="form-control" rows="4">{{ info.history|default:'' }}</textarea>
                    </div>
                </div>
                
                <div class="col-12">
                    <h5 class="mb-3">Google Maps</h5>
                    <div class="mb-3">
                        <label class="form-label">Google Maps Embed Code</label>
                        <textarea name="google_maps_embed" class="form-control" rows="3">{{ info.google_maps_embed|default:'' }}</textarea>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary mt-4"><i class="fas fa-save me-2"></i>Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Laver Transformation Ministries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1B4D7A, #0D2840); }
        .login-card { background: #fff; border-radius: 20px; padding: 50px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 450px; width: 100%; }
        .login-card h2 { color: #1B4D7A; font-weight: 700; }
        .form-control { border-radius: 10px; padding: 12px 15px; }
        .btn-login { background: #1B4D7A; color: #fff; padding: 12px 30px; border-radius: 50px; font-weight: 600; border: none; }
        .btn-login:hover { background: #0D2840; color: #fff; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="fas fa-church fa-3x" style="color: #1B4D7A;"></i>
            <h2 class="mt-3">Staff Login</h2>
            <p class="text-muted">Laver Transformation Ministries</p>
        </div>
        
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none"><i class="fas fa-arrow-left me-2"></i>Back to Website</a>
        </div>
    </div>
</body>
</html>

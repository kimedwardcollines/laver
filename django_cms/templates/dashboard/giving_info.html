{% extends 'dashboard/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="fas fa-hand-holding-heart me-2"></i>Giving Information</h3>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-2"></i>Back</a>
    </div>

    {% if info %}
    <form method="post">
        {% csrf_token %}
        <div class="card-custom">
            <h5 class="mb-3">Basic Information</h5>
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" value="{{ info.title|default:'' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4">{{ info.description|default:'' }}</textarea>
            </div>
        </div>

        <div class="card-custom mt-4">
            <h5 class="mb-3">Mobile Money</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">MTN Mobile Money</label>
                    <input type="text" name="mtn_mobile" class="form-control" value="{{ info.mtn_mobile|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Airtel Money</label>
                    <input type="text" name="airtel_mobile" class="form-control" value="{{ info.airtel_mobile|default:'' }}">
                </div>
            </div>
        </div>

        <div class="card-custom mt-4">
            <h5 class="mb-3">Bank Information</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Bank Name</label>
                    <input type="text" name="bank_name" class="form-control" value="{{ info.bank_name|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Account Name</label>
                    <input type="text" name="bank_account_name" class="form-control" value="{{ info.bank_account_name|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Account Number</label>
                    <input type="text" name="bank_account_number" class="form-control" value="{{ info.bank_account_number|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">SWIFT Code</label>
                    <input type="text" name="bank_swift_code" class="form-control" value="{{ info.bank_swift_code|default:'' }}">
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-2"></i>Save Changes
            </button>
        </div>
    </form>
    {% else %}
    <div class="alert alert-info">No giving information found. Click save to create one.</div>
    <form method="post">
        {% csrf_token %}
        <div class="card-custom">
            <h5 class="mb-3">Create Giving Information</h5>
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" value="Support Our Ministry">
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4">Your generous giving helps us continue our mission to transform lives through God's Word.</textarea>
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-2"></i>Save Changes
            </button>
        </div>
    </form>
    {% endif %}
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<section class="page-hero" style="background: linear-gradient(135deg, rgba(27, 77, 122, 0.9), rgba(13, 40, 64, 0.95)), url('{{ church.logo.url|default:"/static/images/church-bg.jpg" }}') center/cover;">
    <div class="container">
        <h1>Photo Gallery</h1>
        <p>Capturing moments of worship and fellowship</p>
    </div>
</section>

<section class="section">
    <div class="container">
        {% if images %}
        <div class="gallery-grid">
            {% for image in images %}
            <div class="gallery-item">
                <img src="{{ image.image.url }}" alt="{{ image.caption }}">
                <div class="gallery-overlay">
                    {% if image.caption %}<p>{{ image.caption }}</p>{% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center">
            <p class="text-muted">Gallery coming soon...</p>
        </div>
        {% endif %}
    </div>
</section>

<style>
.page-hero { padding: 150px 0 100px; text-align: center; color: #fff; }
.page-hero h1 { font-size: 3rem; margin-bottom: 10px; }
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
.gallery-item { position: relative; border-radius: 15px; overflow: hidden; aspect-ratio: 1; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.gallery-item:hover img { transform: scale(1.1); }
.gallery-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(27, 77, 122, 0.9), transparent); opacity: 0; display: flex; align-items: flex-end; padding: 20px; transition: opacity 0.3s; }
.gallery-item:hover .gallery-overlay { opacity: 1; }
.gallery-overlay p { color: #fff; margin: 0; }
</style>
{% endblock %}
